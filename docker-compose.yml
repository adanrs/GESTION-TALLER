services:
  app:
    build: .
    ports:
      - "9900:9900"
    volumes:
      - taller-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=9900
      - DB_PATH=/app/data/taller.db
      # URL publica de la app (usada para armar el enlace de recuperacion del correo)
      - APP_URL=${APP_URL:-http://localhost:9900}
      # Secreto de sesion (cambialo en produccion)
      - SESSION_SECRET=${SESSION_SECRET:-taller-secret-key-change-in-production}
      # Correo SMTP para recuperacion de contrasena (dejar vacio para modo log/dev)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Email inicial del usuario admin (solo al crear la BD por primera vez)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    restart: unless-stopped

volumes:
  taller-data:
